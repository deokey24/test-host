<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 - DOCKTEACHER</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0B0F1A;
    color: #E6E8EF;
  }
  .layout {
    display: flex;
    min-height: 100vh;
  }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #0E1324;
    border-right: 1px solid #232A42;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
  }
  .sidebar-logo {
    font-size: 15px;
    font-weight: 700;
    color: #E6E8EF;
    padding: 0 20px 20px;
    letter-spacing: 0.02em;
  }
  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .side-link {
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 20px;
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    color: #9AA1BD;
    font-size: 14px;
    cursor: pointer;
  }
  .side-link:hover { background: #151B30; color: #E6E8EF; }
  .side-link.active {
    background: #151B30;
    color: #fff;
    border-left-color: #4A5AF0;
    font-weight: 600;
  }
  .main-wrap {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: #11162A;
    border-bottom: 1px solid #232A42;
  }
  header h1 { font-size: 16px; margin: 0; color: #E6E8EF; font-weight: 600; }
  header form { margin: 0; }
  header button {
    padding: 8px 14px;
    border: 1px solid #2E3654;
    border-radius: 6px;
    background: transparent;
    color: #E6E8EF;
    font-size: 13px;
    cursor: pointer;
  }
  header button:hover { background: #1A2038; }
  main {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 24px;
  }
  .admin-section { display: none; }
  .admin-section.active { display: block; }
  .card {
    background: #11162A;
    border: 1px solid #232A42;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 14px; margin: 0 0 14px; color: #E6E8EF; }
  .card input[type="text"], .card input[type="file"], .card input[type="number"],
  .card select, .card textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #2E3654;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 10px;
    background: #0B0F1A;
    color: #E6E8EF;
    font-family: inherit;
  }
  .card input::placeholder, .card textarea::placeholder { color: #6B7390; }
  .card input:focus, .card select:focus, .card textarea:focus {
    outline: none;
    border-color: #4A5AF0;
  }
  .card textarea { resize: vertical; min-height: 60px; }
  .card button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    background: #4A5AF0;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }
  .card button:hover { background: #3A48D6; }
  .card button:disabled { background: #2E3654; color: #6B7390; cursor: not-allowed; }
  .progress {
    height: 8px;
    background: #232A42;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 12px;
    display: none;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #4A5AF0;
    transition: width 0.2s;
  }
  .status-text { font-size: 12px; color: #9AA1BD; margin-top: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #232A42; }
  th { color: #9AA1BD; font-weight: 500; }
  td { color: #E6E8EF; }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  .badge-uploading, .badge-queued { background: #3A2E10; color: #E8B84B; }
  .badge-processing { background: #16233F; color: #6FA8FF; }
  .badge-done { background: #10301F; color: #4FCE8B; }
  .badge-failed { background: #3A1418; color: #F27C88; }
  .badge-pw-yes { background: #10301F; color: #4FCE8B; }
  .badge-pw-no { background: #3A2E10; color: #E8B84B; }
  .class-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 12px;
  }
  .class-form-grid .full { grid-column: 1 / -1; }
  .field-label {
    display: block;
    font-size: 12px;
    color: #9AA1BD;
    margin-bottom: 4px;
  }
  .class-form-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .class-form-actions .btn-secondary {
    background: transparent;
    border: 1px solid #2E3654;
    color: #E6E8EF;
  }
  .class-form-actions .btn-secondary:hover { background: #1A2038; }
  .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; color: #9AA1BD; }
  .check-row input { width: auto; margin: 0; }
  .row-btn {
    padding: 5px 10px;
    border: 1px solid #2E3654;
    border-radius: 6px;
    background: transparent;
    color: #E6E8EF;
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
  }
  .row-btn:hover { background: #1A2038; }
  .row-btn.danger { border-color: #5A2730; color: #F27C88; }
  .row-btn.danger:hover { background: #2A1418; }
  .badge-active-yes { background: #10301F; color: #4FCE8B; }
  .badge-active-no { background: #3A2E10; color: #E8B84B; }
  .class-table-wrap { overflow-x: auto; }
  .member-toolbar { display: flex; gap: 8px; margin-bottom: 14px; }
  .member-toolbar input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #2E3654;
    border-radius: 6px;
    font-size: 14px;
    background: #0B0F1A;
    color: #E6E8EF;
  }
  .member-toolbar input::placeholder { color: #6B7390; }
  .member-toolbar button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    background: #4A5AF0;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }
  .member-toolbar button:hover { background: #3A48D6; }
  .member-table-wrap { overflow-x: auto; }
  .member-pagination { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 13px; color: #9AA1BD; }
  .member-pagination button {
    padding: 6px 12px;
    border: 1px solid #2E3654;
    border-radius: 6px;
    background: transparent;
    color: #E6E8EF;
    font-size: 13px;
    cursor: pointer;
  }
  .member-pagination button:hover:not(:disabled) { background: #1A2038; }
  .member-pagination button:disabled { color: #4A5170; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">DOCKTEACHER 관리자</div>
      <nav class="sidebar-nav">
        <button class="side-link active" data-target="videoSection">영상 업로드</button>
        <button class="side-link" data-target="classSection">클래스 관리</button>
        <button class="side-link" data-target="memberSection">회원목록</button>
      </nav>
    </aside>
    <div class="main-wrap">
      <header>
        <h1 id="sectionTitle">영상 업로드</h1>
        <form method="POST" action="/admin/logout">
          <button type="submit">로그아웃</button>
        </form>
      </header>
      <main>
        <section id="videoSection" class="admin-section active">
          <div class="card">
            <h2>영상 업로드</h2>
            <input type="text" id="title" placeholder="강의 제목">
            <input type="file" id="file" accept="video/*">
            <button id="uploadBtn">업로드</button>
            <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
            <div class="status-text" id="statusText"></div>
          </div>
          <div class="card">
            <h2>업로드된 영상</h2>
            <table>
              <thead><tr><th>제목</th><th>상태</th><th>등록일</th></tr></thead>
              <tbody id="videoList"></tbody>
            </table>
          </div>
        </section>
        <section id="classSection" class="admin-section">
          <div class="card">
            <h2 id="classFormTitle">클래스 등록</h2>
            <div class="class-form-grid">
              <div>
                <label class="field-label">필터 탭</label>
                <select id="cfFilterTab">
                  <option>경찰대 편입</option>
                  <option>연고대 논술</option>
                  <option>파이널반</option>
                  <option>인강</option>
                  <option>전체</option>
                </select>
              </div>
              <div>
                <label class="field-label">카테고리 라벨 *</label>
                <input type="text" id="cfCategory" placeholder="예: 2027 경찰대 편입">
              </div>
              <div>
                <label class="field-label">배지 스타일</label>
                <select id="cfBadgeStyle">
                  <option value="new">NEW (초록)</option>
                  <option value="hot">HOT (빨강)</option>
                  <option value="enroll">수강신청 (파랑)</option>
                </select>
              </div>
              <div>
                <label class="field-label">배지 문구</label>
                <input type="text" id="cfBadgeText" placeholder="예: NEW / HOT / 수강신청">
              </div>
              <div class="full">
                <label class="field-label">썸네일 제목 * (줄바꿈 그대로 반영)</label>
                <textarea id="cfThumbTitle" rows="2" placeholder="예: 경찰대 언어논리&#10;4월 신규반"></textarea>
              </div>
              <div>
                <label class="field-label">썸네일 과목·강사</label>
                <input type="text" id="cfThumbSubject" placeholder="예: 언어논리 · 황성찬">
              </div>
              <div>
                <label class="field-label">썸네일 배경 (CSS gradient)</label>
                <input type="text" id="cfThumbGradient" placeholder="비우면 기본 네이비 그라데이션">
              </div>
              <div class="full">
                <label class="field-label">강좌명 (카드 본문) *</label>
                <input type="text" id="cfName" placeholder="예: [경찰대 편입] 2027년 대비 황성찬T 경찰대 언어논리 4월 신규반 개강">
              </div>
              <div>
                <label class="field-label">수강 신청 기간</label>
                <input type="text" id="cfEnrollPeriod" placeholder="예: 2026.03.20 ~ 2026.04.10">
              </div>
              <div>
                <label class="field-label">수강 기간</label>
                <input type="text" id="cfCoursePeriod" placeholder="예: 2026.04.01 ~ 2026.11.30">
              </div>
              <div>
                <label class="field-label">모집인원 표기</label>
                <input type="text" id="cfCapacityNote" placeholder="예: 선착순 마감 / N수생 25% 할인">
              </div>
              <div>
                <label class="field-label">할인율 표기</label>
                <input type="text" id="cfDiscount" placeholder="예: 25% (없으면 비움)">
              </div>
              <div>
                <label class="field-label">가격 *</label>
                <input type="text" id="cfPrice" placeholder="예: 280,000원 / 가격 문의">
              </div>
              <div>
                <label class="field-label">할인 전 가격</label>
                <input type="text" id="cfOriginalPrice" placeholder="예: 510,000원 (없으면 비움)">
              </div>
              <div>
                <label class="field-label">상세페이지 ID</label>
                <input type="text" id="cfDetailPage" placeholder="비우면 기본 상세페이지">
              </div>
              <div>
                <label class="field-label">노출 순서</label>
                <input type="number" id="cfSortOrder" value="0">
              </div>
            </div>
            <label class="check-row"><input type="checkbox" id="cfIsActive" checked> 사이트에 노출</label>
            <div class="class-form-actions">
              <button id="classSaveBtn">등록</button>
              <button id="classCancelBtn" class="btn-secondary" style="display:none;">수정 취소</button>
              <span class="status-text" id="classFormStatus" style="margin-top:0;"></span>
            </div>
          </div>
          <div class="card">
            <h2>클래스 목록 (<span id="classTotal">0</span>개)</h2>
            <div class="class-table-wrap">
              <table>
                <thead>
                  <tr><th>순서</th><th>강좌명</th><th>필터</th><th>가격</th><th>노출</th><th>관리</th></tr>
                </thead>
                <tbody id="classList"></tbody>
              </table>
            </div>
          </div>
        </section>
        <section id="memberSection" class="admin-section">
          <div class="card">
            <h2>회원목록 (<span id="memberTotal">0</span>명)</h2>
            <div class="member-toolbar">
              <input type="text" id="memberSearch" placeholder="아이디, 이름, 이메일, 연락처로 검색">
              <button id="memberSearchBtn">검색</button>
            </div>
            <div class="member-table-wrap">
              <table>
                <thead>
                  <tr><th>아이디</th><th>이름</th><th>이메일</th><th>연락처</th><th>가입일</th><th>비밀번호</th></tr>
                </thead>
                <tbody id="memberList"></tbody>
              </table>
            </div>
            <div class="member-pagination">
              <button id="memberPrevBtn">이전</button>
              <span id="memberPageInfo"></span>
              <button id="memberNextBtn">다음</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    document.querySelectorAll('.side-link').forEach(link => {
      link.addEventListener('click', () => {
        document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        link.classList.add('active');
        document.getElementById(link.dataset.target).classList.add('active');
        document.getElementById('sectionTitle').textContent = link.textContent;
      });
    });

    const PART_CONCURRENCY = 4;

    async function loadVideos() {
      const res = await fetch('/admin/api/videos');
      const videos = await res.json();
      const tbody = document.getElementById('videoList');
      tbody.innerHTML = videos.map(v => `
        <tr>
          <td>${v.title}</td>
          <td><span class="badge badge-${v.status}">${v.status}</span></td>
          <td>${new Date(v.created_at).toLocaleString('ko-KR')}</td>
        </tr>
      `).join('');
    }

    async function uploadPart(url, blob, partNumber, onProgress) {
      const res = await fetch(url, { method: 'PUT', body: blob });
      if (!res.ok) throw new Error(`파트 ${partNumber} 업로드 실패`);
      onProgress(blob.size);
      return { PartNumber: partNumber, ETag: res.headers.get('ETag') };
    }

    async function uploadInParallel(items, worker, concurrency) {
      const results = new Array(items.length);
      let cursor = 0;
      async function runNext() {
        const i = cursor++;
        if (i >= items.length) return;
        results[i] = await worker(items[i], i);
        return runNext();
      }
      await Promise.all(Array.from({ length: concurrency }, runNext));
      return results;
    }

    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const title = document.getElementById('title').value.trim();
      const fileInput = document.getElementById('file');
      const file = fileInput.files[0];
      const btn = document.getElementById('uploadBtn');
      const progress = document.getElementById('progress');
      const progressBar = document.getElementById('progressBar');
      const statusText = document.getElementById('statusText');

      if (!title || !file) {
        alert('제목과 파일을 모두 선택해주세요.');
        return;
      }

      btn.disabled = true;
      progress.style.display = 'block';
      statusText.textContent = '업로드 준비 중...';

      try {
        const presignRes = await fetch('/admin/api/videos/presign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, fileSize: file.size })
        });
        if (!presignRes.ok) throw new Error('presign 요청 실패');
        const { videoId, partSize, urls } = await presignRes.json();

        let uploadedBytes = 0;
        const onProgress = (bytes) => {
          uploadedBytes += bytes;
          progressBar.style.width = `${Math.min(100, (uploadedBytes / file.size) * 100)}%`;
          statusText.textContent = `업로드 중... ${(uploadedBytes / 1e9).toFixed(2)}GB / ${(file.size / 1e9).toFixed(2)}GB`;
        };

        const parts = await uploadInParallel(urls, async ({ partNumber, url }) => {
          const start = (partNumber - 1) * partSize;
          const end = Math.min(partNumber * partSize, file.size);
          const blob = file.slice(start, end);
          return uploadPart(url, blob, partNumber, onProgress);
        }, PART_CONCURRENCY);

        statusText.textContent = '업로드 완료 처리 중...';
        parts.sort((a, b) => a.PartNumber - b.PartNumber);
        const completeRes = await fetch(`/admin/api/videos/${videoId}/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ parts })
        });
        if (!completeRes.ok) throw new Error('완료 처리 실패');

        statusText.textContent = '업로드 완료. 트랜스코딩 대기열에 등록되었습니다.';
        document.getElementById('title').value = '';
        fileInput.value = '';
        await loadVideos();
      } catch (err) {
        statusText.textContent = `오류: ${err.message}`;
      } finally {
        btn.disabled = false;
        progress.style.display = 'none';
        progressBar.style.width = '0%';
      }
    });

    loadVideos();
    setInterval(loadVideos, 10000);

    const MEMBER_PAGE_SIZE = 50;
    let memberPage = 1;
    let memberSearch = '';

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function loadMembers() {
      const params = new URLSearchParams({ page: memberPage, pageSize: MEMBER_PAGE_SIZE });
      if (memberSearch) params.set('search', memberSearch);
      const res = await fetch(`/admin/api/members?${params}`);
      const { total, page, pageSize, rows } = await res.json();

      document.getElementById('memberTotal').textContent = total;
      const tbody = document.getElementById('memberList');
      tbody.innerHTML = rows.map(m => `
        <tr>
          <td>${escapeHtml(m.username)}</td>
          <td>${escapeHtml(m.name)}</td>
          <td>${escapeHtml(m.email)}</td>
          <td>${escapeHtml(m.phone || m.mobile)}</td>
          <td>${m.joined_at ? new Date(m.joined_at).toLocaleDateString('ko-KR') : ''}</td>
          <td><span class="badge badge-pw-${m.has_password ? 'yes' : 'no'}">${m.has_password ? '설정됨' : '미설정'}</span></td>
        </tr>
      `).join('');

      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      document.getElementById('memberPageInfo').textContent = `${page} / ${totalPages}`;
      document.getElementById('memberPrevBtn').disabled = page <= 1;
      document.getElementById('memberNextBtn').disabled = page >= totalPages;
    }

    document.getElementById('memberSearchBtn').addEventListener('click', () => {
      memberSearch = document.getElementById('memberSearch').value.trim();
      memberPage = 1;
      loadMembers();
    });
    document.getElementById('memberSearch').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('memberSearchBtn').click();
    });
    document.getElementById('memberPrevBtn').addEventListener('click', () => {
      if (memberPage > 1) { memberPage--; loadMembers(); }
    });
    document.getElementById('memberNextBtn').addEventListener('click', () => {
      memberPage++; loadMembers();
    });

    loadMembers();

    // ── 클래스 관리 ──
    const CLASS_FIELD_INPUTS = {
      filter_tab: 'cfFilterTab',
      category: 'cfCategory',
      badge_style: 'cfBadgeStyle',
      badge_text: 'cfBadgeText',
      thumb_title: 'cfThumbTitle',
      thumb_subject: 'cfThumbSubject',
      thumb_gradient: 'cfThumbGradient',
      name: 'cfName',
      enroll_period: 'cfEnrollPeriod',
      course_period: 'cfCoursePeriod',
      capacity_note: 'cfCapacityNote',
      discount: 'cfDiscount',
      price: 'cfPrice',
      original_price: 'cfOriginalPrice',
      detail_page: 'cfDetailPage',
      sort_order: 'cfSortOrder'
    };
    let editingClassId = null;
    let classCache = [];

    function readClassForm() {
      const body = {};
      for (const [field, id] of Object.entries(CLASS_FIELD_INPUTS)) {
        body[field] = document.getElementById(id).value.trim();
      }
      body.is_active = document.getElementById('cfIsActive').checked;
      return body;
    }

    function fillClassForm(cls) {
      for (const [field, id] of Object.entries(CLASS_FIELD_INPUTS)) {
        document.getElementById(id).value = cls[field] ?? '';
      }
      document.getElementById('cfIsActive').checked = !!cls.is_active;
    }

    function resetClassForm() {
      editingClassId = null;
      fillClassForm({ filter_tab: '경찰대 편입', badge_style: 'new', sort_order: 0, is_active: 1 });
      document.getElementById('classFormTitle').textContent = '클래스 등록';
      document.getElementById('classSaveBtn').textContent = '등록';
      document.getElementById('classCancelBtn').style.display = 'none';
      document.getElementById('classFormStatus').textContent = '';
    }

    async function loadClasses() {
      const res = await fetch('/admin/api/classes');
      if (!res.ok) return;
      classCache = await res.json();
      document.getElementById('classTotal').textContent = classCache.length;
      document.getElementById('classList').innerHTML = classCache.map(c => `
        <tr>
          <td>${c.sort_order}</td>
          <td>${escapeHtml(c.name)}</td>
          <td>${escapeHtml(c.filter_tab)}</td>
          <td>${escapeHtml(c.price)}</td>
          <td><span class="badge badge-active-${c.is_active ? 'yes' : 'no'}">${c.is_active ? '노출' : '숨김'}</span></td>
          <td>
            <button class="row-btn" data-edit-class="${c.id}">수정</button>
            <button class="row-btn danger" data-delete-class="${c.id}">삭제</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('classList').addEventListener('click', async (e) => {
      const editId = e.target.dataset.editClass;
      const deleteId = e.target.dataset.deleteClass;

      if (editId) {
        const cls = classCache.find(c => String(c.id) === editId);
        if (!cls) return;
        editingClassId = cls.id;
        fillClassForm(cls);
        document.getElementById('classFormTitle').textContent = `클래스 수정 (#${cls.id})`;
        document.getElementById('classSaveBtn').textContent = '수정 저장';
        document.getElementById('classCancelBtn').style.display = '';
        document.getElementById('classFormStatus').textContent = '';
        document.getElementById('classSection').scrollIntoView({ behavior: 'smooth' });
      }

      if (deleteId) {
        const cls = classCache.find(c => String(c.id) === deleteId);
        if (!cls || !confirm(`"${cls.name}" 클래스를 삭제할까요?\n삭제 후 되돌릴 수 없습니다.`)) return;
        const res = await fetch(`/admin/api/classes/${deleteId}`, { method: 'DELETE' });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || '삭제에 실패했습니다.');
          return;
        }
        if (String(editingClassId) === deleteId) resetClassForm();
        await loadClasses();
      }
    });

    document.getElementById('classSaveBtn').addEventListener('click', async () => {
      const body = readClassForm();
      const status = document.getElementById('classFormStatus');

      if (!body.category || !body.thumb_title || !body.name || !body.price) {
        status.textContent = '카테고리, 썸네일 제목, 강좌명, 가격은 필수입니다.';
        return;
      }

      const url = editingClassId ? `/admin/api/classes/${editingClassId}` : '/admin/api/classes';
      const res = await fetch(url, {
        method: editingClassId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        status.textContent = data.error || '저장에 실패했습니다.';
        return;
      }

      const wasEditing = editingClassId;
      resetClassForm();
      document.getElementById('classFormStatus').textContent = wasEditing ? '수정되었습니다.' : '등록되었습니다.';
      await loadClasses();
    });

    document.getElementById('classCancelBtn').addEventListener('click', resetClassForm);

    loadClasses();
  </script>
</body>
</html>
