<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 - DOCK PASS</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@main/dist/web/variable/pretendardvariable.css');
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    background: #15191c;
    color: #ffffff;
  }
  body { display: grid; place-items: center; padding: 20px; }
  .login-wrap { display: flex; flex-direction: column; align-items: center; }
  .login-box {
    background: #232a2e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.35);
  }
  h1 { font-size: 17px; font-weight: 800; margin: 0 0 24px; text-align: center; color: #ffffff; }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 16px;
    background: #15191c;
    color: #ffffff;
    font-family: inherit;
  }
  input[type="password"]::placeholder { color: rgba(255,255,255,0.35); }
  input[type="password"]:focus { outline: none; border-color: #0ea968; }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #0ea968;
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #0a7a4c; }
  .error { color: #ff8a8a; font-size: 13px; margin: -8px 0 16px; text-align: center; }
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>관리자 로그인</h1>
      <form method="POST" action="/admin/login">
        {{ERROR}}
        <input type="password" name="password" placeholder="비밀번호" autofocus required>
        <button type="submit">로그인</button>
      </form>
    </div>
  </div>
</body>
</html>
