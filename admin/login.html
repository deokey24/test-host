<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 - DOCKTEACHER</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0B0F1A;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .login-box {
    background: #11162A;
    border: 1px solid #232A42;
    border-radius: 12px;
    padding: 40px 32px;
    width: 100%;
    max-width: 320px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 24px;
    text-align: center;
    color: #E6E8EF;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #2E3654;
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 16px;
    background: #0B0F1A;
    color: #E6E8EF;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: #4A5AF0;
  }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #4A5AF0;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #3A48D6; }
  .error {
    color: #F27C88;
    font-size: 13px;
    margin: -8px 0 16px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="login-box">
    <h1>관리자 로그인</h1>
    <form method="POST" action="/admin/login">
      {{ERROR}}
      <input type="password" name="password" placeholder="비밀번호" autofocus required>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
